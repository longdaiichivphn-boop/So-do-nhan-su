<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const FC={apiKey:"AIzaSyBxIm_VP1D1B8F8YNtqb-sMjsyN_r1OW4M",authDomain:"so-do-nhan-su.firebaseapp.com",projectId:"so-do-nhan-su",storageBucket:"so-do-nhan-su.firebasestorage.app",messagingSenderId:"764196231915",appId:"1:764196231915:web:2ca6e0a7ccf03876907cae"};
const app=initializeApp(FC);
const db=getFirestore(app);
const REF=doc(db,"orgdata","main");
window._fbSave=async(data)=>{try{await setDoc(REF,{payload:JSON.stringify(data)});}catch(e){console.warn("Firebase save error",e);}};
window._fbLoad=async()=>{try{const snap=await getDoc(REF);if(snap.exists())return JSON.parse(snap.data().payload);}catch(e){console.warn("Firebase load error",e);}return null;};
window._fbListen=cb=>{onSnapshot(REF,snap=>{if(snap.exists()){try{cb(JSON.parse(snap.data().payload));}catch(e){}}});};
window._fbReady=true;
document.dispatchEvent(new Event("fb-ready"));
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

.a-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--color-border-tertiary)}

/* PANEL */

.save-toast{text-align:center;font-size:12px;color:var(--color-text-success);margin-top:8px;height:16px;transition:opacity .4s}
.train-summary{display:flex;align-items:center;gap:10px;margin-bottom:12px}

.module-group{margin-bottom:10px}

.mg-tag{font-size:10px;padding:1px 6px;border-radius:6px;font-weight:500}
.mg-common{background:#E6F1FB;color:#0C447C}.mg-sales{background:#EEEDFE;color:#3C3489}.mg-bo{background:#E1F5EE;color:#085041}
.module-item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;margin-bottom:4px;border:1px solid var(--color-border-secondary);background:var(--color-background-primary)}

.ml-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;border:1px solid var(--color-border-secondary);margin-bottom:6px;background:var(--color-background-primary)}

.add-row{display:flex;gap:8px;margin-bottom:10px}

.add-btn{padding:7px 14px;border-radius:8px;background:#7F77DD;border:none;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}

.save-btn-green{width:100%;padding:9px;border-radius:8px;background:#1D9E75;border:none;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}

.pw-wrap{max-width:440px}

/* ---- LAYOUT ---- */
let NW=132,NH=100,HG=20,VG=56;
function layout(){
  const map={};NS.forEach(n=>{map[n.id]={...n,ch:[]};});
  const roots=[];NS.forEach(n=>{if(n.pId&&map[n.pId])map[n.pId].ch.push(map[n.id]);else if(!n.pId)roots.push(map[n.id]);});
  function msr(nd){if(!nd.ch.length){nd._w=NW;return;}nd.ch.forEach(msr);nd._w=Math.max(NW,nd.ch.reduce((s,c)=>s+c._w,0)+HG*(nd.ch.length-1));}
  function plc(nd,x,y){nd._x=x+nd._w/2-NW/2;nd._y=y;if(!nd.ch.length)return;let cx=x;nd.ch.forEach(c=>{plc(c,cx,y+NH+VG);cx+=c._w+HG;});}
  roots.forEach(r=>msr(r));let cx=0;roots.forEach(r=>{plc(r,cx,0);cx+=r._w+HG;});
  const tw=roots.reduce((s,r)=>s+r._w,0)+HG*(roots.length-1);
  function flat(nd,a){a.push(nd);nd.ch.forEach(c=>flat(c,a));return a;}
  const all=[];roots.forEach(r=>flat(r,all));
  return{all,tw};
}

/* ---- ZOOM & PAN ---- */
let _z=1,_tx=0,_ty=0,_drag=false,_dx=0,_dy=0,_ox=0,_oy=0;
function applyTransform(){const i=document.getElementById('oc');if(i){i.style.transform=`translate(${_tx}px,${_ty}px) scale(${_z})`;const l=document.getElementById('zlbl');if(l)l.textContent=Math.round(_z*100)+'%';}}
function zoomChange(d){_z=Math.min(2,Math.max(0.2,_z+d));applyTransform();}
function zoomReset(){const vp=document.getElementById('ovp');if(!vp)return;const oc=document.getElementById('oc');if(!oc)return;const vw=vp.clientWidth,vh=vp.clientHeight;const cw=oc.scrollWidth,ch=oc.scrollHeight;_z=Math.min(vw/cw,vh/ch,1)*0.92;_tx=(vw-cw*_z)/2;_ty=Math.max(8,(vh-ch*_z)/2);applyTransform();}
function initZoomPan(){const vp=document.getElementById('ovp');if(!vp)return;vp.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?-0.08:0.08;_z=Math.min(2,Math.max(0.2,_z+d));applyTransform();},{passive:false});vp.addEventListener('mousedown',e=>{if(e.target.closest('.nc'))return;_drag=true;_dx=e.clientX-_tx;_dy=e.clientY-_ty;vp.classList.add('dragging');});document.addEventListener('mousemove',e=>{if(!_drag)return;_tx=e.clientX-_dx;_ty=e.clientY-_dy;applyTransform();});document.addEventListener('mouseup',()=>{_drag=false;document.getElementById('ovp')?.classList.remove('dragging');});vp.addEventListener('touchstart',e=>{if(e.touches.length===1){_drag=true;_dx=e.touches[0].clientX-_tx;_dy=e.touches[0].clientY-_ty;}},{passive:true});vp.addEventListener('touchmove',e=>{if(_drag&&e.touches.length===1){_tx=e.touches[0].clientX-_dx;_ty=e.touches[0].clientY-_dy;applyTransform();}},{passive:true});vp.addEventListener('touchend',()=>{_drag=false;});}

function draw(){
  const oc=document.getElementById('oc');if(!oc)return;
  const{all,tw}=layout();
  const PAD=16,W=Math.max(tw,340)+PAD*2;
  const maxY=all.reduce((m,n)=>Math.max(m,n._y),0);
  const H=maxY+NH+PAD*2+64;
  let conn='';
  all.forEach(nd=>{
    nd.ch.forEach(ch=>{
      const px=nd._x+NW/2+PAD,py=nd._y+NH+PAD,cx=ch._x+NW/2+PAD,cy=ch._y+PAD,my=py+VG/2;
      const clr=cc(ch);
      conn+=`<path d="M${px},${py} L${px},${my} L${cx},${my} L${cx},${cy}" fill="none" stroke="${clr}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
      conn+=`<circle cx="${px}" cy="${py}" r="3" fill="${clr}"/><circle cx="${cx}" cy="${cy}" r="3" fill="${clr}"/>`;
    });
    if(canM()){
      const gx=nd._x+NW/2+PAD,gy=nd._y+NH+PAD+VG/2+14;
      conn+=`<circle cx="${gx}" cy="${gy}" r="10" fill="var(--color-background-primary)" stroke="#7F77DD" stroke-width="2" style="cursor:pointer;filter:drop-shadow(0 1px 3px rgba(127,119,221,.3))" onclick="sAdd('${nd.id}')"/>`;
      conn+=`<text x="${gx}" y="${gy+5}" text-anchor="middle" font-size="14" fill="#7F77DD" style="cursor:pointer;pointer-events:none;font-weight:600">+</text>`;
    }
  });
  let fo='';
  all.forEach(nd=>{
    const x=nd._x+PAD,y=nd._y+PAD;
    const ed=canE(nd.id),vw=canV(nd.id);
    const st=gstat(nd.id);
    const brCls=nd.br==='top'?'nt':nd.br==='sales'?'ns':'nb';
    const lk=!ed&&!vw?' locked':'';
    const lbl=nd.label;
    // Glow/border color if label set
    const borderStyle=lbl?`border-color:${lbl.color}!important;box-shadow:0 0 0 3px ${lbl.color}33;`:'';
    let pill='';
    if(nd.id!=='gd'&&st){
      const c=pcls(st.p);const bc2=bclr(st.p);const pct=st.p;const bw=Math.round(pct);
      pill=`<div class="nc-train-wrap" onclick="${ed||vw?`oPanel('${nd.id}',${ed})`:'void(0)'}" style="cursor:${ed||vw?'pointer':'default'}"><div class="nc-train-bar-bg"><div class="nc-train-bar-fg" style="width:${bw}%;background:${bc2}"></div></div><div class="nc-train-label"><span class="nc-train-pct" style="background:${bc2}22;color:${bc2}">${pct}%</span><span class="nc-train-sub">${st.d}/${st.t} module</span></div></div>`;
    }
    else if(nd.id!=='gd'){pill=`<div class="nc-train-wrap"><div class="nc-train-label"><span class="nc-train-sub" style="color:var(--color-text-tertiary);font-style:italic">Chưa có module</span></div></div>`;}
    const labelTag=lbl?`<div style="display:flex;justify-content:center;margin-top:3px"><span class="nc-label-tag" style="background:${lbl.color}">${lbl.name}</span></div>`:'';
    const eb=ed?`<button class="edit-btn-abs" onclick="event.stopPropagation();oPanel('${nd.id}',true)"><i class="fa-solid fa-pen-to-square fa-xs"></i></button>`:'';
    const vb=vw&&!ed?`<button class="edit-btn-abs" onclick="event.stopPropagation();oPanel('${nd.id}',false)"><i class="fa-solid fa-eye fa-xs"></i></button>`:'';
    const db=ed&&nd.id!=='gd'?`<button class="del-btn-abs" onclick="event.stopPropagation();delN('${nd.id}')"><i class="fa-solid fa-xmark fa-xs"></i></button>`:'';
    // 🎨 label button — admin only
    const lbtn=isA()?`<button class="tag-btn-abs" style="background:${lbl?lbl.color:'#9B99A6'}" onclick="event.stopPropagation();openLP('${nd.id}',event)" title="Gắn nhãn màu"><i class="fa-solid fa-palette" style="color:#fff;font-size:8px"></i></button>`:'';
    const ni=ed?`<input id="ni-${nd.id}" type="text" value="${nd.name||''}" placeholder="Nhập tên..." oninput="upN('${nd.id}',this.value)">`:`<input id="ni-${nd.id}" type="text" value="${nd.name||''}" placeholder="—" disabled>`;
    const pe=isA()?`<span class="pos-display editable" id="ps-${nd.id}" title="Nhấn để đổi tên chức danh" onclick="sEP('${nd.id}',this)">${nd.pos}</span>`:`<span class="pos-display">${nd.pos}</span>`;
    const roleEl=isA()
      ?`<div class="nc-role editable-role" onclick="sER('${nd.id}',this)">${nd.role}</div>`
      :`<div class="nc-role">${nd.role}</div>`;
    fo+=`<foreignObject x="${x}" y="${y}" width="${NW}" height="${NH}">
      <div xmlns="http://www.w3.org/1999/xhtml" class="nc ${brCls}${lk}" style="${borderStyle}${ed||vw?'cursor:pointer':''}" onclick="${ed||vw?`oPanel('${nd.id}',${ed})`:''}">
        ${eb}${vb}${db}${lbtn}
        ${roleEl}${pe}
        <div class="nc-namewrap">${ni}</div>
        ${pill}${labelTag}
        ${isA()?`<div class="resize-handle" onmousedown="startResize(event)">⠿</div>`:''}
      </div></foreignObject>`;
  });
  oc.innerHTML=`<svg class="org-svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${conn}${fo}</svg>`;
}

/* ---- LABEL PICKER ---- */
function openLP(id,evt){
  if(!isA())return;
  evt.stopPropagation();
  closeLPPopup();
  lpNode=id;
  const nd=byId(id);
  const popup=document.createElement('div');
  popup.className='lp-popup';popup.id='lp-popup';
  const presetsHTML=PRESETS.map(p=>{
    const sel=nd.label&&nd.label.id===p.id?' selected':'';
    return`<div class="preset-row${sel}" onclick="applyPreset('${p.id}')" data-pid="${p.id}">
      <div class="preset-dot" style="background:${p.color}"></div>
      <span class="preset-name">${p.name}</span>
      <span class="preset-count">${NS.filter(n=>n.label&&n.label.id===p.id).length} người</span>
    </div>`;
  }).join('');
  popup.innerHTML=`
    <h5>Gắn nhãn màu <button onclick="closeLPPopup()"><i class="fa-solid fa-xmark"></i></button></h5>
    <div class="preset-grid">${presetsHTML}</div>
    <div class="lp-divider"></div>
    <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:8px;font-weight:500">NHÃN TỰ CHỌN</div>
    <div class="custom-color-row">
      <label>Chọn màu</label>
      <input type="color" id="lp-clr" value="${nd.label&&!nd.label.id?nd.label.color:'#7F77DD'}">
    </div>
    <div class="custom-name-row">
      <input id="lp-name" placeholder="Tên nhãn tự chọn..." value="${nd.label&&!nd.label.id?nd.label.name:''}">
    </div>
    <button class="apply-btn" onclick="applyCustom()"><i class="fa-solid fa-check fa-xs"></i> Áp dụng nhãn tự chọn</button>
    <button class="clear-btn" onclick="clearLabel()"><i class="fa-solid fa-xmark fa-xs"></i> Xóa nhãn</button>`;
  // Position popup near the SVG canvas
  const oc=document.getElementById('oc');
  if(oc){oc.style.position='relative';oc.appendChild(popup);}
  // Close on outside click
  setTimeout(()=>document.addEventListener('click',outsideLP),10);
}
function outsideLP(e){if(!document.getElementById('lp-popup')?.contains(e.target)){closeLPPopup();}}
function closeLPPopup(){const p=document.getElementById('lp-popup');if(p)p.remove();document.removeEventListener('click',outsideLP);lpNode=null;}
function applyPreset(pid){
  const nd=byId(lpNode);if(!nd)return;
  const pr=PRESETS.find(p=>p.id===pid);if(!pr)return;
  nd.label={id:pr.id,name:pr.name,color:pr.color};
  save();closeLPPopup();draw();updateLabelLegend();
}
function applyCustom(){
  const nd=byId(lpNode);if(!nd)return;
  const color=document.getElementById('lp-clr').value;
  const name=document.getElementById('lp-name').value.trim()||'Nhãn tự chọn';
  nd.label={id:null,name,color};
  save();closeLPPopup();draw();updateLabelLegend();
}
function clearLabel(){
  const nd=byId(lpNode);if(!nd)return;
  nd.label=null;save();closeLPPopup();draw();updateLabelLegend();
}
function updateLabelLegend(){
  const ll=document.getElementById('ll');
  const legendItems=[];
  NS.forEach(n=>{if(n.label){const exists=legendItems.find(l=>l.name===n.label.name);if(!exists)legendItems.push({name:n.label.name,color:n.label.color});}});
  if(ll){ll.innerHTML=legendItems.map(l=>`<div class="ll-item"><div class="ll-dot" style="background:${l.color}"></div>${l.name}</div>`).join('');}
  else if(legendItems.length){
    const oc=document.getElementById('oc');
    if(oc){const div=document.createElement('div');div.className='label-legend';div.id='ll';div.innerHTML=legendItems.map(l=>`<div class="ll-item"><div class="ll-dot" style="background:${l.color}"></div>${l.name}</div>`).join('');oc.insertAdjacentElement('afterend',div);}
  }
}

/* ---- EDIT POS ---- */
function sEP(id,el){
  if(!isA()||epid===id)return;epid=id;
  const nd=byId(id);el.style.display='none';
  const inp=document.createElement('input');inp.className='pos-input';inp.value=nd.pos;
  inp.onblur=()=>cEP(id,inp,el);
  inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=nd.pos;inp.blur();}e.stopPropagation();};
  inp.oninput=()=>{if(inp.value.trim())nd.pos=inp.value.trim();};
  el.parentNode.insertBefore(inp,el.nextSibling);inp.focus();inp.select();
}
function cEP(id,inp,span){const nd=byId(id);if(nd&&inp.value.trim())nd.pos=inp.value.trim();epid=null;save();if(inp.parentNode)inp.parentNode.removeChild(inp);span.style.display='';span.textContent=nd?nd.pos:'';if(aid===id){const e=document.getElementById('pps');if(e)e.textContent=nd?nd.pos:'';}}

/* ---- EDIT ROLE LABEL ---- */
let erid=null;
function sER(id,el){
  if(!isA()||erid===id)return;erid=id;
  const nd=byId(id);el.style.display='none';
  const inp=document.createElement('input');inp.className='role-input';inp.value=nd.role;
  inp.onblur=()=>{if(inp.value.trim())nd.role=inp.value.trim();erid=null;save();if(inp.parentNode)inp.parentNode.removeChild(inp);el.style.display='';el.textContent=nd.role;};
  inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=nd.role;inp.blur();}e.stopPropagation();};
  el.parentNode.insertBefore(inp,el.nextSibling);inp.focus();inp.select();
}

/* ---- RESIZE CARDS ---- */
let _rsX=0,_rsY=0,_rsW=0,_rsH=0;
function startResize(e){
  e.preventDefault();e.stopPropagation();
  _rsX=e.clientX;_rsY=e.clientY;_rsW=NW;_rsH=NH;
  const mm=ev=>{
    const dx=ev.clientX-_rsX,dy=ev.clientY-_rsY;
    NW=Math.max(110,Math.round(_rsW+dx));
    NH=Math.max(80,Math.round(_rsH+dy));
    draw();
  };
  const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
  document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
}
function upN(id,v){const n=byId(id);if(n)n.name=v;if(aid===id){const e=document.getElementById('pnm');if(e)e.textContent=v||'(Chưa có tên)';}}
function delN(id){if(!canE(id))return;const ds=gDesc(id);const al=[id,...ds];NS=NS.filter(n=>!al.includes(n.id));if(aid&&al.includes(aid)){cPanel();aid=null;}save();draw();}
function gDesc(id){const ch=kids(id);const r=ch.map(c=>c.id);ch.forEach(c=>r.push(...gDesc(c.id)));return r;}
function sAdd(pid){anp=pid;sam=true;showM();}

/* ---- TASKS IN PANEL ---- */
function rPanelTasks(nodeId){
  const sec=document.getElementById('ptasksec');if(!sec)return;
  const tasks=TASKS.filter(t=>t.nodeId===nodeId);
  const canEdit=canGiveTask();
  const STATUS_DOT={todo:'#9B99A6',doing:'#2980B9',done:'#27AE60',block:'#E74C3C'};
  let h=`<div class="sec-title" style="display:flex;align-items:center;justify-content:space-between">
    <span><i class="fa-solid fa-list-check fa-xs" style="margin-right:5px;color:#7F77DD"></i>Công việc được giao <span style="font-weight:400;font-size:10px;color:var(--color-text-tertiary)">(${tasks.filter(t=>t.status==='done').length}/${tasks.length} xong)</span></span>
    ${canEdit?`<span style="font-size:10px;font-weight:400;color:#7F77DD;cursor:pointer;text-transform:none;letter-spacing:0" onclick="view='tasks';taskFilterNode='${nodeId}';render()">Xem tất cả →</span>`:''}
  </div>`;
  if(tasks.length===0){h+=`<div style="font-size:12px;color:var(--color-text-tertiary);padding:4px 0;font-style:italic">Chưa có công việc nào.</div>`;}
  else{
    tasks.forEach(t=>{
      const dot=STATUS_DOT[t.status]||'#ccc';
      const stLbl=TASK_STATUS_LABEL[t.status]||t.status;
      const stOpts=TASK_STATUS.map(s=>`<option value="${s}"${t.status===s?' selected':''}>${TASK_STATUS_LABEL[s]}</option>`).join('');
      h+=`<div class="panel-task-item${t.status==='done'?' ptdone':''}">
        <div class="pt-status" style="background:${dot}" title="${stLbl}"></div>
        <div class="pt-title">${t.title}</div>
        ${t.due?`<div class="pt-due">${t.due}</div>`:''}
        ${canEdit?`<select class="pt-status-sel" onchange="updTask('${t.id}','status',this.value);rPanelTasks('${nodeId}')">${stOpts}</select>`:`<div class="pt-due">${stLbl}</div>`}
        ${canEdit?`<button class="pt-del" onclick="delTask('${t.id}');rPanelTasks('${nodeId}')"><i class="fa-solid fa-xmark"></i></button>`:''}
      </div>`;
    });
  }
  if(canEdit){
    h+=`<div class="add-pt-row">
      <input id="pt-inp-${nodeId}" placeholder="Thêm công việc..." onkeydown="if(event.key==='Enter')addPanelTask('${nodeId}')">
      <select id="pt-pri-${nodeId}"><option value="med">TB</option><option value="high">Cao</option><option value="low">Thấp</option></select>
      <input type="date" id="pt-due-${nodeId}" style="width:110px;padding:5px 6px;border:1.5px solid var(--color-border-secondary);border-radius:7px;font-size:11px;font-family:inherit;outline:none">
      <button class="add-pt-btn" onclick="addPanelTask('${nodeId}')"><i class="fa-solid fa-plus fa-xs"></i></button>
    </div>`;
  }
  sec.innerHTML=h;
}

function addPanelTask(nodeId){
  const inp=document.getElementById('pt-inp-'+nodeId);
  const pri=document.getElementById('pt-pri-'+nodeId);
  const due=document.getElementById('pt-due-'+nodeId);
  if(!inp||!inp.value.trim())return;
  TASKS.push({id:tuid(),nodeId,title:inp.value.trim(),priority:pri?pri.value:'med',status:'todo',due:due?due.value:'',by:ses.name,created:new Date().toISOString().slice(0,10)});
  inp.value='';if(due)due.value='';
  save();rPanelTasks(nodeId);
}

function rTr(id,ed){
  const sec=document.getElementById('trsec');if(!sec)return;
  const nd=byId(id);
  if(nd&&nd.id==='gd'){sec.innerHTML=`<div class="sec-title">Đào tạo nghiệp vụ</div><div style="font-size:12px;color:var(--color-text-tertiary);padding:6px 0;font-style:italic">Không áp dụng cho vị trí Giám đốc</div>`;return;}
  const mods=gmods(id);
  if(!mods.length){sec.innerHTML=`<div class="sec-title">Đào tạo nghiệp vụ</div><div style="font-size:12px;color:var(--color-text-tertiary);padding:6px 0;font-style:italic">Chưa có module. <span style="color:#7F77DD;cursor:pointer" onclick="view='modules';render()">Thêm →</span></div>`;return;}
  const dn=mods.filter(m=>nd&&nd.tr[m.id]).length,pct=Math.round(dn/mods.length*100),bc=bclr(pct);
  const cm=MOD.common.filter(m=>mods.find(x=>x.id===m.id));
  const bm=mods.filter(m=>!MOD.common.find(x=>x.id===m.id));
  const bl=nd&&nd.br==='sales'?'Kinh doanh':'Back Office';
  let h=`<div class="sec-title">Đào tạo nghiệp vụ${ed?' <span style="font-weight:400;font-size:10px;text-transform:none;letter-spacing:0;color:var(--color-text-tertiary)">— nhấn ô để tích</span>':''}</div>
  <div class="train-summary"><div class="train-bar-wrap"><div class="train-bar-fill" style="width:${pct}%;background:${bc}"></div></div><span style="font-size:12px;font-weight:500;min-width:60px;text-align:right;color:${bc}">${dn}/${mods.length} (${pct}%)</span></div>`;
  if(cm.length){h+=`<div class="module-group"><div class="mg-label">Module chung <span class="mg-tag mg-common">Tất cả</span></div>`;cm.forEach(m=>{h+=mhtml(id,m,ed);});h+='</div>';}
  if(bm.length){const tc=nd&&nd.br==='sales'?'mg-sales':'mg-bo';h+=`<div class="module-group"><div class="mg-label">Module chuyên ngành <span class="mg-tag ${tc}">${bl}</span></div>`;bm.forEach(m=>{h+=mhtml(id,m,ed);});h+='</div>';}
  sec.innerHTML=h;
}
function mhtml(nid,mod,ed){const nd=byId(nid);const ck=!!(nd&&nd.tr[mod.id]);const dt=ck?`<span class="mi-date">${nd.tr[mod.id]}</span>`:'';return`<div class="module-item${ck?' done':''}"><div class="mi-check${ck?' checked':''}${ed?' clickable':''}"${ed?` onclick="togM('${nid}','${mod.id}')"`:''}>${ck?'<i class="fa-solid fa-check fa-xs"></i>':''}</div><div class="mi-name">${mod.name}</div>${dt}</div>`;}
function togM(nid,mid){const nd=byId(nid);if(!nd||!canE(nid))return;const today=new Date().toLocaleDateString('vi-VN');if(nd.tr[mid])delete nd.tr[mid];else nd.tr[mid]=today;save();rTr(nid,true);draw();}
function svPanel(){if(!aid||!canE(aid))return;const nd=byId(aid);if(!nd)return;nd.cv=document.getElementById('f-cv').value;nd.cm=document.getElementById('f-cm').value;nd.kn=document.getElementById('f-kn').value;nd.ph=document.getElementById('f-ph').value;nd.em=document.getElementById('f-em').value;save();const t=document.getElementById('pst');t.textContent='✓ Đã lưu thành công';t.style.opacity='1';setTimeout(()=>{t.style.opacity='0';},2500);}
function cPanel(){const p=document.getElementById('mp');if(p)p.classList.remove('visible');aid=null;}

/* ---- MODULES ---- */
function rMod(){
  document.getElementById('app').innerHTML=`<div class="screen">${tbar()}
    <div class="page-wrap">
      <h3><i class="fa-solid fa-list-check" style="color:#7F77DD;margin-right:6px"></i>Quản lý chương trình đào tạo</h3>
      <p class="page-sub">Tùy chỉnh các module theo chương trình của tổ chức bạn.</p>
      <div class="mod-tabs">
        <button class="mod-tab" onclick="mtab='common';rML()">Chung (tất cả)</button>
        ${ses.role==='admin'||ses.branch==='sales'?`<button class="mod-tab" onclick="mtab='sales';rML()">Kinh doanh</button>`:''}
        ${ses.role==='admin'||ses.branch==='bo'?`<button class="mod-tab" onclick="mtab='bo';rML()">Back Office</button>`:''}
      </div>
      <div id="mlc"></div>
      <div class="add-row"><input id="nm" placeholder="Tên module mới..." onkeydown="if(event.key==='Enter')aM()"><button class="add-btn" onclick="aM()"><i class="fa-solid fa-plus fa-xs"></i> Thêm</button></div>
      <button class="save-btn-green" onclick="save();toast('mt','✓ Đã lưu')"><i class="fa-solid fa-floppy-disk fa-xs"></i> Lưu thay đổi</button>
      <div class="save-toast" id="mt" style="margin-top:8px"></div>
    </div></div>`;rML();
}
function rML(){document.querySelectorAll('.mod-tab').forEach(t=>{const m={'Chung (tất cả)':'common','Kinh doanh':'sales','Back Office':'bo'};t.classList.toggle('active',m[t.textContent.trim()]===mtab);});const mods=MOD[mtab],c=document.getElementById('mlc');c.innerHTML=mods.length?`<div style="margin-bottom:8px">${mods.map((m,i)=>`<div class="ml-item"><span style="font-size:11px;color:var(--color-text-tertiary);min-width:18px;text-align:center">${i+1}</span><input value="${m.name}" oninput="MOD['${mtab}'][${i}].name=this.value"><button class="ml-del" onclick="dM('${mtab}',${i})"><i class="fa-solid fa-xmark fa-xs"></i></button></div>`).join('')}</div>`:`<div style="font-size:12px;color:var(--color-text-tertiary);padding:10px 0;font-style:italic;margin-bottom:8px">Chưa có module nào.</div>`;}
function aM(){const inp=document.getElementById('nm'),nm=inp.value.trim();if(!nm)return;MOD[mtab].push({id:mtab[0]+Date.now(),name:nm});inp.value='';rML();}
function dM(t,i){const mid=MOD[t][i].id;MOD[t].splice(i,1);NS.forEach(n=>{delete n.tr[mid];});rML();}

/* ---- PASSWORD ---- */
function rPw(){
  const ia=ses.role==='admin';
  document.getElementById('app').innerHTML=`<div class="screen">${tbar()}
    <div class="page-wrap pw-wrap">
      <h3><i class="fa-solid fa-key" style="color:#7F77DD;margin-right:6px"></i>Đổi mật khẩu</h3>
      <p class="page-sub" style="margin-bottom:16px">${ia?'Admin có thể đổi mật khẩu của tất cả tài khoản quản lý.':'Bạn chỉ có thể đổi mật khẩu của chính mình.'}</p>
      ${pwC(ses.username,'Tài khoản của bạn',{admin:'ba',manager:'bm'}[ses.role]||'bs',true)}
      ${ia?pwC('truongkd','Trưởng phòng KD','bm',false)+pwC('truongbo','Trưởng phòng BO','bm',false):''}
    </div></div>`;
}
function pwC(u,lb,bc,is){const s=u.replace(/[^a-z0-9]/g,'');return`<div class="pw-section"><h4><i class="fa-solid fa-user fa-xs" style="color:var(--color-text-tertiary)"></i>${lb} <span class="pw-role ${bc}">${USERS[u].display}</span><span style="font-size:11px;color:var(--color-text-tertiary);font-weight:400;margin-left:4px">@${u}</span></h4><p>${is?'Nhập mật khẩu hiện tại để xác nhận.':'Đặt mật khẩu mới (không cần nhập mật khẩu cũ).'}</p>${is?`<div class="pw-field"><label>Mật khẩu hiện tại</label><div class="pw-row"><input type="password" id="po-${s}" placeholder="••••••••"><button onclick="tpw('po-${s}',this)"><i class="fa-solid fa-eye fa-xs"></i></button></div></div>`:''}<div class="pw-field"><label>Mật khẩu mới</label><div class="pw-row"><input type="password" id="pn-${s}" placeholder="Tối thiểu 6 ký tự" oninput="cs('${s}')"><button onclick="tpw('pn-${s}',this)"><i class="fa-solid fa-eye fa-xs"></i></button></div><div class="pw-strength" id="ps-${s}"></div></div><div class="pw-field"><label>Xác nhận mật khẩu mới</label><div class="pw-row"><input type="password" id="pc-${s}" placeholder="Nhập lại mật khẩu mới"><button onclick="tpw('pc-${s}',this)"><i class="fa-solid fa-eye fa-xs"></i></button></div></div><div class="pw-err" id="pe-${s}"></div><div class="pw-ok" id="pk-${s}"></div><button class="pw-btn" onclick="sbpw('${u}','${s}',${is})"><i class="fa-solid fa-check fa-xs"></i> Xác nhận đổi mật khẩu</button></div>`;}
function tpw(id,btn){const i=document.getElementById(id);if(!i)return;i.type=i.type==='password'?'text':'password';btn.innerHTML=i.type==='text'?'<i class="fa-solid fa-eye-slash fa-xs"></i>':'<i class="fa-solid fa-eye fa-xs"></i>';}
function cs(s){const pw=document.getElementById('pn-'+s).value;const v=pws(pw);const b=document.getElementById('ps-'+s);if(b){b.style.width=v.s+'%';b.style.background=v.c;}}
function sbpw(u,s,is){const e=document.getElementById('pe-'+s),ok=document.getElementById('pk-'+s);e.textContent='';ok.textContent='';const nw=document.getElementById('pn-'+s).value,cf=document.getElementById('pc-'+s).value;if(is){const old=document.getElementById('po-'+s).value;if(old!==USERS[u].password){e.textContent='Mật khẩu hiện tại không đúng.';return;}}if(nw.length<6){e.textContent='Mật khẩu mới phải ít nhất 6 ký tự.';return;}if(nw!==cf){e.textContent='Mật khẩu xác nhận không khớp.';return;}USERS[u].password=nw;save();if(is)document.getElementById('po-'+s).value='';document.getElementById('pn-'+s).value='';document.getElementById('pc-'+s).value='';document.getElementById('ps-'+s).style.background='transparent';ok.textContent='✓ Đổi mật khẩu thành công!';}

function toast(id,msg){const t=document.getElementById(id);if(!t)return;t.textContent=msg;t.style.opacity='1';setTimeout(()=>{t.style.opacity='0';},2500);}
function logout(){ses=null;aid=null;view='org';sam=false;render();}


/* ---- TASKS VIEW ---- */
let taskFilterNode='all',taskFilterStatus='all';
const canGiveTask=()=>ses&&(ses.role==='admin'||ses.role==='manager');

function rTasks(){
  const staffNodes=NS.filter(n=>n.id!=='gd');
  // Filter nodes manager can see
  const visibleNodes=isA()?staffNodes:staffNodes.filter(n=>n.br===ses.branch||abr(n.id)===ses.branch);
  
  let filteredTasks=TASKS.filter(t=>{
    const nodeOk=taskFilterNode==='all'||t.nodeId===taskFilterNode;
    const statusOk=taskFilterStatus==='all'||t.status===taskFilterStatus;
    return nodeOk&&statusOk;
  });
  // Manager only sees tasks for their branch
  if(!isA()){filteredTasks=filteredTasks.filter(t=>{const n=byId(t.nodeId);return n&&(n.br===ses.branch||abr(t.nodeId)===ses.branch);});}

  // Group by person
  const grouped={};
  filteredTasks.forEach(t=>{if(!grouped[t.nodeId])grouped[t.nodeId]=[];grouped[t.nodeId].push(t);});

  const nodeOpts=visibleNodes.map(n=>`<option value="${n.id}">${n.name||n.pos}</option>`).join('');
  const statusOpts=Object.entries(TASK_STATUS_LABEL).map(([k,v])=>`<option value="${k}">${v}</option>`).join('');

  let html=`<div class="screen"><div class="task-wrap">
    ${tbar()}
    <div class="task-header">
      <h3><i class="fa-solid fa-list-check fa-sm" style="color:#7F77DD;margin-right:6px"></i>Giao việc theo nhân sự</h3>
      <div class="task-filter">
        <select onchange="taskFilterNode=this.value;rTasks()"><option value="all">Tất cả nhân sự</option>${nodeOpts}</select>
        <select onchange="taskFilterStatus=this.value;rTasks()"><option value="all">Tất cả trạng thái</option>${statusOpts}</select>
      </div>
    </div>`;

  if(Object.keys(grouped).length===0){
    html+=`<div style="text-align:center;padding:40px;color:var(--color-text-tertiary);font-size:13px"><i class="fa-solid fa-inbox fa-2x" style="margin-bottom:10px;display:block;opacity:.4"></i>Chưa có công việc nào</div>`;
  } else {
    Object.entries(grouped).forEach(([nodeId,tasks])=>{
      const nd=byId(nodeId);if(!nd)return;
      const done=tasks.filter(t=>t.status==='done').length;
      const av=ini(nd.name||nd.pos);
      html+=`<div class="task-section">
        <div class="task-section-header">
          <div class="task-av">${av}</div>
          <h4>${nd.name||'(Chưa có tên)'} <span style="font-weight:400;color:var(--color-text-tertiary)">· ${nd.pos}</span></h4>
          <span class="task-count">${done}/${tasks.length} xong</span>
        </div>
        <table class="task-table">
          <thead><tr><th style="width:38%">Công việc</th><th>Ưu tiên</th><th>Trạng thái</th><th>Hạn</th><th>Giao bởi</th><th></th></tr></thead>
          <tbody>`;
      tasks.forEach(t=>{
        const canEdit=canGiveTask();
        const priCls=TASK_PRIORITY_CLS[t.priority]||'tp-med';
        const priLbl=TASK_PRIORITY_LABEL[t.priority]||'';
        const stCls=TASK_STATUS_CLS[t.status]||'ts-todo';
        const stLbl=TASK_STATUS_LABEL[t.status]||'';
        const priOpts=TASK_PRIORITY.map(p=>`<option value="${p}"${t.priority===p?' selected':''}>${TASK_PRIORITY_LABEL[p]}</option>`).join('');
        const stOpts=TASK_STATUS.map(s=>`<option value="${s}"${t.status===s?' selected':''}>${TASK_STATUS_LABEL[s]}</option>`).join('');
        html+=`<tr>
          <td><input class="task-title-inp" value="${t.title||''}" ${canEdit?'':'disabled'} onchange="updTask('${t.id}','title',this.value)"></td>
          <td>${canEdit
            ?`<select style="border:none;background:transparent;font-size:11px;font-family:inherit;color:inherit;outline:none;cursor:pointer" onchange="updTask('${t.id}','priority',this.value)">${priOpts}</select>`
            :`<span class="task-priority ${priCls}">${priLbl}</span>`}
          </td>
          <td>${canEdit
            ?`<select style="border:none;background:transparent;font-size:11px;font-family:inherit;outline:none;cursor:pointer" class="${stCls}" onchange="updTask('${t.id}','status',this.value)">${stOpts}</select>`
            :`<span class="task-status ${stCls}">${stLbl}</span>`}
          </td>
          <td><input type="date" class="task-date-inp" value="${t.due||''}" ${canEdit?'':'disabled'} onchange="updTask('${t.id}','due',this.value)"></td>
          <td style="font-size:11px;color:var(--color-text-tertiary)">${t.by||''}</td>
          <td>${canEdit?`<button class="task-del" onclick="delTask('${t.id}')"><i class="fa-solid fa-xmark"></i></button>`:''}</td>
        </tr>`;
      });
      html+=`</tbody></table>`;
      if(canGiveTask()){
        const nodeSelectOpts=visibleNodes.map(n=>`<option value="${n.id}"${n.id===nodeId?' selected':''}>${n.name||n.pos}</option>`).join('');
        html+=`<div class="add-task-row" style="padding:10px 14px;border-top:1px solid var(--color-border-secondary)">
          <select id="nt-node-${nodeId}"><option value="">Chọn người...</option>${nodeSelectOpts}</select>
          <input id="nt-title-${nodeId}" placeholder="Tên công việc..." onkeydown="if(event.key==='Enter')addTask('${nodeId}')">
          <select id="nt-pri-${nodeId}"><option value="med">Trung bình</option><option value="high">Cao</option><option value="low">Thấp</option></select>
          <input type="date" id="nt-due-${nodeId}">
          <button class="add-btn" onclick="addTask('${nodeId}')"><i class="fa-solid fa-plus fa-xs"></i> Thêm</button>
        </div>`;
      }
      html+=`</div>`;
    });
  }

  // Add new task section for any node
  if(canGiveTask()){
    const nodeSelectOpts2=visibleNodes.map(n=>`<option value="${n.id}">${n.name||n.pos} · ${n.pos}</option>`).join('');
    html+=`<div class="task-section">
      <div class="task-section-header"><h4>➕ Giao việc mới</h4></div>
      <div class="add-task-row" style="padding:12px 14px">
        <select id="nt-node-new"><option value="">Chọn người...</option>${nodeSelectOpts2}</select>
        <input id="nt-title-new" placeholder="Tên công việc..." onkeydown="if(event.key==='Enter')addTask('new')">
        <select id="nt-pri-new"><option value="med">Trung bình</option><option value="high">Cao</option><option value="low">Thấp</option></select>
        <input type="date" id="nt-due-new">
        <button class="add-btn" onclick="addTask('new')"><i class="fa-solid fa-plus fa-xs"></i> Thêm</button>
      </div>
    </div>`;
  }

  html+=`</div></div>`;
  document.getElementById('app').innerHTML=html;
}

function addTask(groupNodeId){
  const nodeEl=document.getElementById('nt-node-'+groupNodeId);
  const titleEl=document.getElementById('nt-title-'+groupNodeId);
  const priEl=document.getElementById('nt-pri-'+groupNodeId);
  const dueEl=document.getElementById('nt-due-'+groupNodeId);
  if(!nodeEl||!titleEl)return;
  const nodeId=nodeEl.value||groupNodeId;
  const title=titleEl.value.trim();
  if(!nodeId||!title)return;
  TASKS.push({id:tuid(),nodeId,title,priority:priEl?priEl.value:'med',status:'todo',due:dueEl?dueEl.value:'',by:ses.name,created:new Date().toISOString().slice(0,10)});
  save();rTasks();
}

function updTask(tid,field,val){
  const t=TASKS.find(x=>x.id===tid);if(t){t[field]=val;save();}
}

function delTask(tid){
  TASKS=TASKS.filter(x=>x.id!==tid);save();if(document.getElementById("ptasksec")){}else{rTasks();}
}

// Wait for Firebase then load & render
async function init(){
  await load();
  render();
  startListen();
}
if(window._fbReady){init();}
else{document.addEventListener('fb-ready',init);}
</script>
</body></html>
